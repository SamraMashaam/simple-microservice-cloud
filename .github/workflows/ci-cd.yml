name: CI/CD Pipeline

on:
  push:
    branches:
      - master
    paths:
      - 'QuoteService/**'
      - 'ApiGateway/**'
      - 'FrontendApplication/**'
      - '.github/workflows/**'

# Add permissions for the workflow
permissions:
  contents: write

env:
  DOCKER_USERNAME: armasm
  
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Get short SHA
        id: vars
        run: echo "SHORT_SHA=$(echo ${GITHUB_SHA} | cut -c1-7)" >> $GITHUB_OUTPUT
      
      - name: Build and push QuoteService
        uses: docker/build-push-action@v4
        with:
          context: ./QuoteService
          push: true
          tags: |
            ${{ env.DOCKER_USERNAME }}/quote-service:${{ steps.vars.outputs.SHORT_SHA }}
            ${{ env.DOCKER_USERNAME }}/quote-service:latest
      
      - name: Build and push ApiGateway
        uses: docker/build-push-action@v4
        with:
          context: ./ApiGateway
          push: true
          tags: |
            ${{ env.DOCKER_USERNAME }}/api-gateway:${{ steps.vars.outputs.SHORT_SHA }}
            ${{ env.DOCKER_USERNAME }}/api-gateway:latest
      
      - name: Build and push FrontendApplication
        uses: docker/build-push-action@v4
        with:
          context: ./FrontendApplication
          push: true
          tags: |
            ${{ env.DOCKER_USERNAME }}/frontend-app:${{ steps.vars.outputs.SHORT_SHA }}
            ${{ env.DOCKER_USERNAME }}/frontend-app:latest
      
      - name: Update Kubernetes manifests
        run: |
          sed -i "s|${{ env.DOCKER_USERNAME }}/quote-service:.*|${{ env.DOCKER_USERNAME }}/quote-service:${{ steps.vars.outputs.SHORT_SHA }}|g" k8s/quote-service-deployment.yaml
          sed -i "s|${{ env.DOCKER_USERNAME }}/api-gateway:.*|${{ env.DOCKER_USERNAME }}/api-gateway:${{ steps.vars.outputs.SHORT_SHA }}|g" k8s/api-gateway-deployment.yaml
          sed -i "s|${{ env.DOCKER_USERNAME }}/frontend-app:.*|${{ env.DOCKER_USERNAME }}/frontend-app:${{ steps.vars.outputs.SHORT_SHA }}|g" k8s/frontend-deployment.yaml
      
      - name: Commit and push updated manifests
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add k8s/*.yaml
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update image tags to ${{ steps.vars.outputs.SHORT_SHA }}" && git push)
